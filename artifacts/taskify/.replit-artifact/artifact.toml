kind = "web"
previewPath = "/"
title = "Taskify"
version = "1.0.0"
id = "artifacts/taskify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22180

[services.development]
run = "pnpm --filter @workspace/taskify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taskify", "run", "build" ]
publicDir = "artifacts/taskify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22180"
BASE_PATH = "/"
