[build]
  command = "pnpm install && pnpm run build"
  publish = "artifacts/taskify/dist/public"

# Proxy requests to the API server
[[redirects]]
  from = "/api/*"
  to = "https://taskify-go9c.onrender.com/api/:splat"
  status = 200
  force = true

# Fallback for Single Page Application routing (React Router / wouter)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
